# =============================================================================
# SECRET TEMPLATE — DO NOT store real values here.
#
# Option A — kubectl (manual):
#   kubectl create secret generic openclaw-secrets \
#     --namespace openclaw-production \
#     --from-literal=DB_PASSWORD='<real-password>' \
#     --from-literal=REDIS_PASSWORD='<real-password>' \
#     --from-literal=ANTHROPIC_API_KEY='sk-ant-...' \
#     --from-literal=JWT_SECRET='<64-char-random-string>' \
#     --from-literal=SLACK_BOT_TOKEN='xoxb-...' \
#     --from-literal=SLACK_SIGNING_SECRET='<secret>' \
#     --from-literal=SLACK_WEBHOOK='https://hooks.slack.com/...' \
#     --from-literal=GITHUB_TOKEN='ghp_...' \
#     --from-literal=GITHUB_WEBHOOK_SECRET='<secret>' \
#     --from-literal=SMTP_PASSWORD='<password>' \
#     --from-literal=SENTRY_DSN='https://...@sentry.io/...' \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# Option B — Sealed Secrets (recommended for GitOps):
#   1. Install the Sealed Secrets controller:
#      kubectl apply -f https://github.com/bitnami-labs/sealed-secrets/releases/latest/download/controller.yaml
#   2. Install kubeseal CLI.
#   3. Create a plain Secret file (do NOT commit it), then seal it:
#      kubeseal --format yaml < secret-plain.yaml > sealed-secret.yaml
#   4. Commit sealed-secret.yaml — the controller decrypts it at deploy time.
#
# Option C — External Secrets Operator (for Vault / AWS Secrets Manager / GCP SM):
#   Use an ExternalSecret CRD instead of this file.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: openclaw-secrets
  namespace: openclaw-production
  labels:
    app.kubernetes.io/name: openclaw-teams
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: openclaw
type: Opaque
stringData:
  # --- Database ---
  DB_PASSWORD: "REPLACE_ME"
  DATABASE_URL: "postgresql://openclaw:REPLACE_ME@postgres-0.postgres.openclaw-production.svc.cluster.local:5432/openclaw_teams"

  # --- Redis ---
  REDIS_PASSWORD: "REPLACE_ME"
  REDIS_URL: "redis://:REPLACE_ME@redis-0.redis.openclaw-production.svc.cluster.local:6379/0"

  # --- Anthropic ---
  ANTHROPIC_API_KEY: "REPLACE_ME"

  # --- Auth ---
  JWT_SECRET: "REPLACE_ME"

  # --- Slack ---
  SLACK_BOT_TOKEN: "REPLACE_ME"
  SLACK_SIGNING_SECRET: "REPLACE_ME"
  SLACK_WEBHOOK: "REPLACE_ME"

  # --- GitHub ---
  GITHUB_TOKEN: "REPLACE_ME"
  GITHUB_WEBHOOK_SECRET: "REPLACE_ME"

  # --- SMTP ---
  SMTP_PASSWORD: "REPLACE_ME"

  # --- Sentry ---
  SENTRY_DSN: "REPLACE_ME"

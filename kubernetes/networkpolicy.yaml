---
# Allow openclaw-gateway to receive traffic only from the ingress controller namespace(s)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-gateway
  namespace: openclaw-production
  labels:
    app.kubernetes.io/name: openclaw-gateway
    app.kubernetes.io/component: network-policy
    app.kubernetes.io/part-of: openclaw
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: openclaw-gateway
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Accept HTTP traffic from ingress controller namespaces only
    - from:
        # Envoy Gateway (default in this cluster)
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: envoy-gateway-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: envoy
        # NGINX Ingress (optional / other clusters)
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
    # Allow Prometheus scraping from monitoring namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9090
  egress:
    # Allow DNS resolution
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow calls to PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgres
      ports:
        - protocol: TCP
          port: 5432
    # Allow calls to Redis
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
    # Allow outbound HTTPS (Anthropic API, Slack, GitHub, SMTP, etc.)
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 587

---
# PostgreSQL: accept traffic only from openclaw-gateway
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-to-postgres
  namespace: openclaw-production
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: network-policy
    app.kubernetes.io/part-of: openclaw
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: openclaw-gateway
      ports:
        - protocol: TCP
          port: 5432

---
# Redis: accept traffic only from openclaw-gateway
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-to-redis
  namespace: openclaw-production
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: network-policy
    app.kubernetes.io/part-of: openclaw
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: openclaw-gateway
      ports:
        - protocol: TCP
          port: 6379

---
# Default deny-all for the namespace (least-privilege baseline)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: openclaw-production
  labels:
    app.kubernetes.io/component: network-policy
    app.kubernetes.io/part-of: openclaw
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

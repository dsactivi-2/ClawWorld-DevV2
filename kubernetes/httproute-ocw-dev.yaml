apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ocw-dev
  namespace: openclaw-production
  labels:
    app.kubernetes.io/name: openclaw-gateway
    app.kubernetes.io/component: gateway-route
    app.kubernetes.io/part-of: openclaw
spec:
  hostnames:
    - ocw-dev.k8.activi.io
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: edka-public
      namespace: envoy-gateway-system
      port: 443
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: openclaw-gateway
          port: 3000
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /

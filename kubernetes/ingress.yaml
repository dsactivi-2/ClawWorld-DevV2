apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openclaw-gateway
  namespace: openclaw-production
  labels:
    app.kubernetes.io/name: openclaw-gateway
    app.kubernetes.io/component: ingress
    app.kubernetes.io/part-of: openclaw
  annotations:
    # nginx ingress controller
    # kubernetes.io/ingress.class is deprecated since k8s 1.18 and removed in 1.22+.
    # Use spec.ingressClassName (line 37) instead — do NOT set both.
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"

    # TLS — cert-manager issues the certificate automatically
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "Strict-Transport-Security: max-age=31536000; includeSubDomains";

    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "50"
    nginx.ingress.kubernetes.io/limit-connections: "20"

    # Compression
    nginx.ingress.kubernetes.io/enable-compression: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - openclaw.yourdomain.com
      secretName: openclaw-tls-cert
  rules:
    - host: openclaw.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: openclaw-gateway
                port:
                  name: http

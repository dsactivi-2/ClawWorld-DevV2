# ============================================================
# Nginx Production Configuration — openclaw-teams
# Reverse proxy in front of the API Gateway on port 3000
# ============================================================

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
pid /var/run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # --------------------------------------------------------
    # Basic settings
    # --------------------------------------------------------
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    charset utf-8;
    server_tokens off;                          # Hide Nginx version

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10m;
    client_body_timeout 30s;
    client_header_timeout 15s;
    send_timeout 30s;

    # --------------------------------------------------------
    # Logging format
    # --------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    '$request_time $upstream_response_time '
                    '"$http_x_request_id"';

    log_format json escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"bytes":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_time":"$upstream_response_time",'
            '"upstream_addr":"$upstream_addr",'
            '"http_host":"$host",'
            '"user_agent":"$http_user_agent",'
            '"request_id":"$http_x_request_id",'
            '"forwarded_for":"$http_x_forwarded_for"'
        '}';

    access_log /var/log/nginx/access.log json;

    # --------------------------------------------------------
    # Gzip compression
    # --------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        text/css
        text/javascript
        text/plain
        text/xml
        image/svg+xml;

    # --------------------------------------------------------
    # Rate limiting zones
    # --------------------------------------------------------
    # General API rate limiting: 200 r/m per IP
    limit_req_zone $binary_remote_addr zone=api_limit:20m rate=200r/m;
    # Auth endpoint rate limiting: 10 r/m per IP (brute-force protection)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    # Health endpoint: not rate-limited (monitoring tools need constant access)
    limit_req_status 429;

    # --------------------------------------------------------
    # Connection limiting
    # --------------------------------------------------------
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # --------------------------------------------------------
    # Upstream: OpenClaw API Gateway
    # --------------------------------------------------------
    upstream openclaw_backend {
        least_conn;

        server 127.0.0.1:3000 weight=1 max_fails=3 fail_timeout=30s;
        # Add more backend instances here for horizontal scaling:
        # server 127.0.0.1:3001 weight=1 max_fails=3 fail_timeout=30s;
        # server 127.0.0.1:3002 weight=1 max_fails=3 fail_timeout=30s;

        keepalive 64;
        keepalive_requests 1000;
        keepalive_timeout 60s;
    }

    # --------------------------------------------------------
    # Proxy settings (shared)
    # --------------------------------------------------------
    proxy_http_version 1.1;
    proxy_set_header Connection "";                         # Enable keepalive to upstream
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Request-ID $request_id;

    proxy_connect_timeout 10s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;
    proxy_buffering on;
    proxy_buffer_size 8k;
    proxy_buffers 8 64k;
    proxy_busy_buffers_size 128k;
    proxy_temp_file_write_size 128k;
    proxy_intercept_errors on;

    # --------------------------------------------------------
    # Security headers (applied globally)
    # --------------------------------------------------------
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # --------------------------------------------------------
    # GeoIP / internal subnet definitions
    # --------------------------------------------------------
    geo $is_internal {
        default          0;
        127.0.0.1/32     1;
        10.0.0.0/8       1;
        172.16.0.0/12    1;
        192.168.0.0/16   1;
    }

    # ========================================================
    # SERVER BLOCK 1: HTTP — redirect all traffic to HTTPS
    # ========================================================
    server {
        listen 80 default_server;
        listen [::]:80 default_server;

        server_name _;

        # ACME challenge passthrough for Let's Encrypt renewal
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ========================================================
    # SERVER BLOCK 2: HTTPS — TLS termination + reverse proxy
    # ========================================================
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;

        server_name api.openclaw.io;

        # -------------------------------------------------------
        # TLS Configuration
        # -------------------------------------------------------
        ssl_certificate     /etc/ssl/certs/openclaw.crt;
        ssl_certificate_key /etc/ssl/private/openclaw.key;
        ssl_trusted_certificate /etc/ssl/certs/ca-bundle.crt;

        ssl_session_cache   shared:SSL:50m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # HSTS — 1 year, include subdomains, preload-ready
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # -------------------------------------------------------
        # Content-Security-Policy
        # -------------------------------------------------------
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self';" always;

        # -------------------------------------------------------
        # Connection limit
        # -------------------------------------------------------
        limit_conn conn_limit 100;

        # -------------------------------------------------------
        # /api/ — proxy to OpenClaw backend
        # -------------------------------------------------------
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://openclaw_backend;

            # Strip /api prefix before forwarding
            rewrite ^/api/(.*)$ /$1 break;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            # WebSocket support (for agent streaming)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            add_header X-Request-ID $request_id always;

            error_page 502 503 504 @backend_unavailable;
        }

        # -------------------------------------------------------
        # /api/auth/ — stricter rate limiting for auth endpoints
        # -------------------------------------------------------
        location /api/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;

            proxy_pass http://openclaw_backend;
            rewrite ^/api/auth/(.*)$ /auth/$1 break;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
        }

        # -------------------------------------------------------
        # /health — health check endpoint (public, no rate limit)
        # -------------------------------------------------------
        location /health {
            proxy_pass http://openclaw_backend/health;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;

            access_log off;             # Don't clutter logs with health check noise
        }

        # -------------------------------------------------------
        # /metrics — Prometheus metrics (internal only)
        # -------------------------------------------------------
        location /metrics {
            # Restrict to internal subnets only
            if ($is_internal = 0) {
                return 403 '{"error":"forbidden","message":"Metrics endpoint is not publicly accessible."}';
            }

            proxy_pass http://openclaw_backend/metrics;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            access_log off;
        }

        # -------------------------------------------------------
        # Static files (if served directly from Nginx)
        # -------------------------------------------------------
        location /static/ {
            alias /var/www/openclaw/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # -------------------------------------------------------
        # Favicon
        # -------------------------------------------------------
        location = /favicon.ico {
            alias /var/www/openclaw/static/favicon.ico;
            access_log off;
            log_not_found off;
        }

        # -------------------------------------------------------
        # Deny hidden files
        # -------------------------------------------------------
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # -------------------------------------------------------
        # Custom error pages
        # -------------------------------------------------------
        error_page 404 /errors/404.json;
        error_page 500 502 503 504 /errors/5xx.json;

        location @backend_unavailable {
            default_type application/json;
            return 503 '{"error":"service_unavailable","message":"The service is temporarily unavailable. Please try again shortly."}';
        }

        location /errors/ {
            internal;
            root /var/www/openclaw;
        }
    }

    # ========================================================
    # Map for WebSocket upgrade header
    # ========================================================
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ""      close;
    }
}

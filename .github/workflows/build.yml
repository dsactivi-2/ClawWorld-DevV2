name: Build

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8.15.0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        run: pnpm typecheck

      - name: ESLint
        run: pnpm lint

      - name: Jest unit tests
        run: pnpm test:unit
        env:
          CI: "true"

      - name: Upload unit test coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-coverage-${{ github.sha }}
          path: coverage/
          retention-days: 7

      - name: Build (TypeScript → dist/)
        run: pnpm build

      - name: Docker build (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.production
          push: false
          tags: |
            ghcr.io/clawworld/openclaw-teams:${{ github.sha }}
            ghcr.io/clawworld/openclaw-teams:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript check | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| ESLint | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch: \`${{ github.ref_name }}\` | Commit: \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY

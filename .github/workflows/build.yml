name: Build

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8.15.0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        id: typecheck
        run: pnpm typecheck

      - name: ESLint
        id: lint
        run: pnpm lint

      - name: Jest unit tests
        id: unit_tests
        run: pnpm test:unit
        env:
          CI: "true"

      - name: Upload unit test coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-coverage-${{ github.sha }}
          path: coverage/
          retention-days: 7

      - name: Build (TypeScript → dist/)
        id: ts_build
        run: pnpm build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker build & push
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.production
          platforms: linux/amd64,linux/arm64
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            denis8686/openclaw-teams:${{ github.sha }}
            denis8686/openclaw-teams:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build summary
        if: always()
        run: |
          status_icon() { [[ "$1" == "success" ]] && echo "✅" || echo "❌"; }
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript check | $(status_icon '${{ steps.typecheck.outcome }}') |" >> $GITHUB_STEP_SUMMARY
          echo "| ESLint | $(status_icon '${{ steps.lint.outcome }}') |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | $(status_icon '${{ steps.unit_tests.outcome }}') |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build | $(status_icon '${{ steps.docker_build.outcome }}') |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch: \`${{ github.ref_name }}\` | Commit: \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY

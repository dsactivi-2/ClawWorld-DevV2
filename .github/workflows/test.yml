name: Test

on:
  pull_request:
    branches:
      - main
  workflow_call:
    outputs:
      coverage-artifact:
        description: "Name of the coverage artifact"
        value: ${{ jobs.test.outputs.coverage-artifact }}

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Full Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    outputs:
      coverage-artifact: coverage-${{ github.sha }}

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: openclaw_teams_test
          POSTGRES_USER: openclaw
          POSTGRES_PASSWORD: 78e98cbc18704f3b820e0bfb4da30247266e0d928b44084d4a544f3d63fe629d
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U openclaw -d openclaw_teams_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://openclaw:78e98cbc18704f3b820e0bfb4da30247266e0d928b44084d4a544f3d63fe629d@localhost:5432/openclaw_teams_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: 512985bcd4debdb9e04aabb0db898ab2b0bc3489a989cb3f6002879ce3933ff7238d97be1b64e01f6c41f7d880a2ca5d92a28d56d8686ff56c47ff39e6f29398
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_TEST }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8.15.0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run database migrations
        run: |
          for f in sql/migrations/*.sql; do
            psql "$DATABASE_URL" -f "$f"
          done
        env:
          PGPASSWORD: 78e98cbc18704f3b820e0bfb4da30247266e0d928b44084d4a544f3d63fe629d

      - name: Unit tests
        run: pnpm test:unit
        env:
          CI: "true"

      - name: Integration tests
        run: pnpm test:integration
        env:
          CI: "true"

      - name: Build for E2E
        run: pnpm build

      - name: Start server for E2E
        run: |
          node dist/src/index.js &
          echo $! > /tmp/server.pid
          # Wait for the health endpoint (up to 30s)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "Server is up after ${i}s"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Server failed to start within 30s"
              exit 1
            fi
            sleep 1
          done
        env:
          NODE_ENV: test
          PORT: 3000
          LOG_LEVEL: warn

      - name: E2E tests
        run: pnpm test:e2e
        env:
          CI: "true"
          API_URL: http://localhost:3000

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then
            kill $(cat /tmp/server.pid) 2>/dev/null || true
          fi

      - name: Security audit (npm audit)
        run: |
          pnpm audit --audit-level=high || {
            echo "::warning::npm audit found vulnerabilities — review before merging"
            pnpm audit --audit-level=critical
          }

      - name: Merge coverage reports
        if: always()
        run: |
          mkdir -p coverage/merged
          cp -r coverage/* coverage/merged/ 2>/dev/null || true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ./coverage
          flags: unittests
          name: openclaw-teams-${{ github.sha }}
          fail_ci_if_error: false

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ github.sha }}
          path: coverage/
          retention-days: 14

      - name: Test summary
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Audit | ✅ |" >> $GITHUB_STEP_SUMMARY

name: Test

on:
  pull_request:
    branches:
      - main
  workflow_call:
    outputs:
      coverage-artifact:
        description: "Name of the coverage artifact"
        value: ${{ jobs.test.outputs.coverage-artifact }}

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Full Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    outputs:
      coverage-artifact: coverage-${{ github.sha }}

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: openclaw_teams_test
          POSTGRES_USER: openclaw
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U openclaw -d openclaw_teams_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://openclaw:testpassword@localhost:5432/openclaw_teams_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: test-jwt-secret-that-is-long-enough-for-testing-purposes
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_TEST || 'sk-ant-test' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8.15.0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run database migrations
        run: |
          for f in sql/migrations/*.sql; do
            psql "$DATABASE_URL" -f "$f"
          done
        env:
          PGPASSWORD: testpassword

      - name: Unit tests
        run: pnpm test:unit
        env:
          CI: "true"

      - name: Integration tests
        run: pnpm test:integration
        env:
          CI: "true"

      - name: E2E tests
        run: pnpm test:e2e
        env:
          CI: "true"

      - name: Security audit (npm audit)
        run: |
          pnpm audit --audit-level=high || {
            echo "::warning::npm audit found vulnerabilities — review before merging"
            pnpm audit --audit-level=critical
          }

      - name: Merge coverage reports
        if: always()
        run: |
          mkdir -p coverage/merged
          cp -r coverage/* coverage/merged/ 2>/dev/null || true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ./coverage
          flags: unittests,integration
          name: openclaw-teams-${{ github.sha }}
          fail_ci_if_error: false

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ github.sha }}
          path: coverage/
          retention-days: 14

      - name: Test summary
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Audit | ✅ |" >> $GITHUB_STEP_SUMMARY

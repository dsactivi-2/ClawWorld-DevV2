name: Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: false   # never cancel an in-flight deploy

env:
  REGISTRY: docker.io
  IMAGE_NAME: denis8686/openclaw-teams
  NAMESPACE: openclaw-production
  STAGING_NAMESPACE: openclaw-staging
  DEPLOYMENT: openclaw-gateway

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 — Reuse the full test suite
  # ---------------------------------------------------------------------------
  test:
    name: Test Gate
    uses: ./.github/workflows/test.yml
    secrets: inherit

  # ---------------------------------------------------------------------------
  # Job 2 — Build and push Docker image
  # ---------------------------------------------------------------------------
  build-push:
    name: Build & Push Image
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read

    outputs:
      image: ${{ steps.image.outputs.image }}
      sha-tag: ${{ steps.image.outputs.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=long
            type=raw,value=${{ github.sha }}
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch

      - name: Export image reference
        id: image
        run: |
          echo "sha=${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"
          echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ steps.meta.outputs.labels['org.opencontainers.image.created'] }}

  # ---------------------------------------------------------------------------
  # Job 3 — Deploy to Staging (gate before production)
  # ---------------------------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    needs: build-push
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true   # skip gracefully when no K8s cluster is configured

    environment:
      name: staging
      url: https://staging.openclaw.yourdomain.com

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.29.0"

      - name: Configure kubeconfig
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.kube"
          if [[ -n "${KUBECONFIG_B64:-}" ]]; then
            printf '%s' "${KUBECONFIG_B64}" | base64 --decode > "${HOME}/.kube/config"
          elif [[ -n "${KUBECONFIG_RAW:-}" ]]; then
            printf '%s' "${KUBECONFIG_RAW}" > "${HOME}/.kube/config"
          else
            echo "Missing kubeconfig secret. Set KUBECONFIG_B64 (preferred) or KUBECONFIG." >&2
            exit 1
          fi
          chmod 600 "${HOME}/.kube/config"
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
          KUBECONFIG_RAW: ${{ secrets.KUBECONFIG }}

      - name: Verify cluster connectivity
        run: kubectl cluster-info --request-timeout=10s

      - name: Run database migrations (staging)
        run: |
          PG_POD=$(kubectl get pod \
            --namespace="${{ env.STAGING_NAMESPACE }}" \
            -l app.kubernetes.io/name=postgres \
            --field-selector=status.phase=Running \
            -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
          if [[ -z "${PG_POD}" ]]; then
            echo "No Postgres pod found in ${STAGING_NAMESPACE} — skipping migrations (namespace not yet bootstrapped)"
            exit 0
          fi
          echo "Postgres pod: ${PG_POD}"
          for migration in sql/migrations/*.sql; do
            [[ -f "${migration}" ]] || continue
            FILENAME="$(basename "${migration}")"
            echo "Applying migration: ${FILENAME}"
            kubectl cp "${migration}" "${{ env.STAGING_NAMESPACE }}/${PG_POD}:/tmp/${FILENAME}"
            kubectl exec "${PG_POD}" --namespace="${{ env.STAGING_NAMESPACE }}" -- \
              psql -U openclaw -d openclaw_teams -v ON_ERROR_STOP=1 -f "/tmp/${FILENAME}"
            kubectl exec "${PG_POD}" --namespace="${{ env.STAGING_NAMESPACE }}" -- rm "/tmp/${FILENAME}"
          done

      - name: Update staging image
        run: |
          if ! kubectl get deployment/${{ env.DEPLOYMENT }} --namespace="${{ env.STAGING_NAMESPACE }}" >/dev/null 2>&1; then
            echo "No deployment '${{ env.DEPLOYMENT }}' found in '${{ env.STAGING_NAMESPACE }}' — skipping staging update."
            exit 0
          fi
          kubectl set image deployment/${{ env.DEPLOYMENT }} \
            ${{ env.DEPLOYMENT }}=${{ needs.build-push.outputs.image }} \
            --namespace="${{ env.STAGING_NAMESPACE }}"

      - name: Wait for staging rollout
        run: |
          if ! kubectl get deployment/${{ env.DEPLOYMENT }} --namespace="${{ env.STAGING_NAMESPACE }}" >/dev/null 2>&1; then
            echo "No deployment '${{ env.DEPLOYMENT }}' found in '${{ env.STAGING_NAMESPACE }}' — skipping rollout wait."
            exit 0
          fi
          kubectl rollout status deployment/${{ env.DEPLOYMENT }} \
            --namespace="${{ env.STAGING_NAMESPACE }}" \
            --timeout=180s

      - name: Smoke test staging
        run: |
          if ! kubectl get svc/${{ env.DEPLOYMENT }} --namespace="${{ env.STAGING_NAMESPACE }}" >/dev/null 2>&1; then
            echo "No service '${{ env.DEPLOYMENT }}' found in '${{ env.STAGING_NAMESPACE }}' — skipping smoke test."
            exit 0
          fi
          STAGING_URL="http://$(kubectl get svc ${{ env.DEPLOYMENT }} \
            --namespace='${{ env.STAGING_NAMESPACE }}' \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}'):3000"
          if [[ "${STAGING_URL}" == "http://:3000" ]]; then
            echo "Service '${{ env.DEPLOYMENT }}' has no LoadBalancer IP yet — skipping smoke test."
            exit 0
          fi
          echo "Smoke testing: ${STAGING_URL}/health"
          for i in 1 2 3; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${STAGING_URL}/health" || echo "000")
            echo "Attempt ${i}: HTTP ${HTTP_CODE}"
            [[ "${HTTP_CODE}" == "200" ]] && exit 0
            sleep 10
          done
          echo "Staging smoke test failed"
          exit 1

  # ---------------------------------------------------------------------------
  # Job 4 — Deploy to Production (requires staging gate passing)
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Production
    needs: [build-push, deploy-staging]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true   # skip gracefully when no K8s cluster is configured

    environment:
      name: production
      url: https://openclaw.yourdomain.com

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.29.0"

      - name: Configure kubeconfig
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.kube"
          if [[ -n "${KUBECONFIG_B64:-}" ]]; then
            printf '%s' "${KUBECONFIG_B64}" | base64 --decode > "${HOME}/.kube/config"
          elif [[ -n "${KUBECONFIG_RAW:-}" ]]; then
            printf '%s' "${KUBECONFIG_RAW}" > "${HOME}/.kube/config"
          else
            echo "Missing kubeconfig secret. Set KUBECONFIG_B64 (preferred) or KUBECONFIG." >&2
            exit 1
          fi
          chmod 600 "${HOME}/.kube/config"
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
          KUBECONFIG_RAW: ${{ secrets.KUBECONFIG }}

      - name: Verify cluster connectivity
        run: kubectl cluster-info --request-timeout=10s

      - name: Create Docker Hub pull secret
        run: |
          kubectl create secret docker-registry dockerhub-pull-secret \
            --docker-server=docker.io \
            --docker-username="${{ secrets.DOCKERHUB_USERNAME }}" \
            --docker-password="${{ secrets.DOCKERHUB_TOKEN }}" \
            --namespace="${{ env.NAMESPACE }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply manifests
        run: |
          set -euo pipefail
          for manifest in \
            kubernetes/namespace.yaml \
            kubernetes/configmap.yaml \
            kubernetes/statefulset-postgres.yaml \
            kubernetes/statefulset-redis.yaml \
            kubernetes/deployment.yaml \
            kubernetes/service.yaml \
            kubernetes/ingress.yaml \
            kubernetes/hpa.yaml \
            kubernetes/networkpolicy.yaml; do
            echo "Applying ${manifest}..."
            kubectl apply -f "${manifest}" --namespace="${{ env.NAMESPACE }}"
          done

      - name: Run database migrations (production)
        run: |
          PG_POD=$(kubectl get pod \
            --namespace="${{ env.NAMESPACE }}" \
            -l app.kubernetes.io/name=postgres \
            --field-selector=status.phase=Running \
            -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
          if [[ -z "${PG_POD}" ]]; then
            echo "No Postgres pod found in ${NAMESPACE} — skipping migrations (namespace not yet bootstrapped)"
            exit 0
          fi
          echo "Postgres pod: ${PG_POD}"
          for migration in sql/migrations/*.sql; do
            [[ -f "${migration}" ]] || continue
            FILENAME="$(basename "${migration}")"
            echo "Applying migration: ${FILENAME}"
            kubectl cp "${migration}" "${{ env.NAMESPACE }}/${PG_POD}:/tmp/${FILENAME}"
            kubectl exec "${PG_POD}" --namespace="${{ env.NAMESPACE }}" -- \
              psql -U openclaw -d openclaw_teams -v ON_ERROR_STOP=1 -f "/tmp/${FILENAME}"
            kubectl exec "${PG_POD}" --namespace="${{ env.NAMESPACE }}" -- rm "/tmp/${FILENAME}"
          done

      - name: Update image
        run: |
          IMAGE="${{ needs.build-push.outputs.image }}"
          echo "Image ref: ${IMAGE}"
          if [[ -z "${IMAGE}" ]]; then
            echo "::warning::Image ref is empty — kubectl apply already set the image via deployment.yaml. Skipping set image."
            exit 0
          fi
          if ! kubectl get deployment/${{ env.DEPLOYMENT }} --namespace="${{ env.NAMESPACE }}" >/dev/null 2>&1; then
            echo "::warning::Deployment '${{ env.DEPLOYMENT }}' not found in '${{ env.NAMESPACE }}' — skipping set image (first bootstrap, kubectl apply handled it)."
            exit 0
          fi
          kubectl set image deployment/${{ env.DEPLOYMENT }} \
            ${{ env.DEPLOYMENT }}="${IMAGE}" \
            --namespace="${{ env.NAMESPACE }}"

      - name: Wait for rollout
        run: |
          if ! kubectl get deployment/${{ env.DEPLOYMENT }} --namespace="${{ env.NAMESPACE }}" >/dev/null 2>&1; then
            echo "::warning::Deployment '${{ env.DEPLOYMENT }}' not found — skipping rollout wait."
            exit 0
          fi
          kubectl rollout status deployment/${{ env.DEPLOYMENT }} \
            --namespace="${{ env.NAMESPACE }}" \
            --timeout=300s || {
            echo "::warning::Rollout did not complete within 300s — check pod status on cluster (kubectl get pods -n ${{ env.NAMESPACE }})"
            exit 0
          }

      - name: Verify deployment
        run: |
          if ! kubectl get deployment/${{ env.DEPLOYMENT }} --namespace="${{ env.NAMESPACE }}" >/dev/null 2>&1; then
            echo "::warning::Deployment '${{ env.DEPLOYMENT }}' not found — skipping verification."
            exit 0
          fi
          READY=$(kubectl get deployment ${{ env.DEPLOYMENT }} \
            --namespace="${{ env.NAMESPACE }}" \
            -o jsonpath='{.status.readyReplicas}')
          DESIRED=$(kubectl get deployment ${{ env.DEPLOYMENT }} \
            --namespace="${{ env.NAMESPACE }}" \
            -o jsonpath='{.spec.replicas}')
          echo "Ready: ${READY}/${DESIRED}"
          echo "Ready: ${READY:-0}/${DESIRED:-0}"
          if [[ "${READY:-0}" != "${DESIRED:-0}" ]]; then
            echo "::warning::Deployment not fully ready yet (${READY:-0}/${DESIRED:-0}) — check pods on cluster"
          fi

      - name: Deployment summary
        if: always()
        run: |
          echo "## Deployment" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ needs.build-push.outputs.image }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Namespace | \`${{ env.NAMESPACE }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | https://openclaw.yourdomain.com |" >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # Job 5 — Telegram notification
  # ---------------------------------------------------------------------------
  notify:
    name: Notify Telegram
    needs: [build-push, deploy]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Determine status
        id: status
        run: |
          if [[ "${{ needs.deploy.result }}" == "success" ]]; then
            echo "emoji=🚀"              >> $GITHUB_OUTPUT
            echo "text=Deploy succeeded" >> $GITHUB_OUTPUT
          else
            echo "emoji=🔴"              >> $GITHUB_OUTPUT
            echo "text=Deploy FAILED"    >> $GITHUB_OUTPUT
          fi

      - name: Send Telegram notification
        run: |
          MESSAGE="${{ steps.status.outputs.emoji }} *openclaw-teams — ${{ steps.status.outputs.text }}*

          📌 Branch: \`${{ github.ref_name }}\`
          🔖 Commit: \`${{ github.sha }}\`
          👤 Author: ${{ github.actor }}
          🐳 Image: \`${{ needs.build-push.outputs.image }}\`
          🔗 [View Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --fail \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            --data-urlencode "text=${MESSAGE}" || echo "::warning::Telegram notification failed (token/chat_id not configured)"

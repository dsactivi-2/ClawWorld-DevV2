name: Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: false   # never cancel an in-flight deploy

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: clawworld/openclaw-teams
  NAMESPACE: openclaw-production
  STAGING_NAMESPACE: openclaw-staging
  DEPLOYMENT: openclaw-gateway

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 — Reuse the full test suite
  # ---------------------------------------------------------------------------
  test:
    name: Test Gate
    uses: ./.github/workflows/test.yml
    secrets: inherit

  # ---------------------------------------------------------------------------
  # Job 2 — Build and push Docker image
  # ---------------------------------------------------------------------------
  build-push:
    name: Build & Push Image
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
      sha-tag: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=long
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ steps.meta.outputs.labels['org.opencontainers.image.created'] }}

  # ---------------------------------------------------------------------------
  # Job 3 — Deploy to Staging (gate before production)
  # ---------------------------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    needs: build-push
    runs-on: ubuntu-latest
    timeout-minutes: 15

    environment:
      name: staging
      url: https://staging.openclaw.yourdomain.com

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.29.0"

      - name: Configure kubeconfig
        run: |
          mkdir -p "${HOME}/.kube"
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > "${HOME}/.kube/config"
          chmod 600 "${HOME}/.kube/config"

      - name: Verify cluster connectivity
        run: kubectl cluster-info --request-timeout=10s

      - name: Update staging image
        run: |
          kubectl set image deployment/${{ env.DEPLOYMENT }} \
            ${{ env.DEPLOYMENT }}=${{ needs.build-push.outputs.image }} \
            --namespace="${{ env.STAGING_NAMESPACE }}"

      - name: Wait for staging rollout
        run: |
          kubectl rollout status deployment/${{ env.DEPLOYMENT }} \
            --namespace="${{ env.STAGING_NAMESPACE }}" \
            --timeout=180s

      - name: Smoke test staging
        run: |
          STAGING_URL="http://$(kubectl get svc ${{ env.DEPLOYMENT }} \
            --namespace='${{ env.STAGING_NAMESPACE }}' \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}'):3000"
          echo "Smoke testing: ${STAGING_URL}/health"
          for i in 1 2 3; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${STAGING_URL}/health" || echo "000")
            echo "Attempt ${i}: HTTP ${HTTP_CODE}"
            [[ "${HTTP_CODE}" == "200" ]] && exit 0
            sleep 10
          done
          echo "Staging smoke test failed"
          exit 1

  # ---------------------------------------------------------------------------
  # Job 4 — Deploy to Production (requires staging gate passing)
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Production
    needs: [build-push, deploy-staging]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    environment:
      name: production
      url: https://openclaw.yourdomain.com

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.29.0"

      - name: Configure kubeconfig
        run: |
          mkdir -p "${HOME}/.kube"
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > "${HOME}/.kube/config"
          chmod 600 "${HOME}/.kube/config"

      - name: Verify cluster connectivity
        run: kubectl cluster-info --request-timeout=10s

      - name: Apply manifests
        run: |
          for manifest in \
            kubernetes/namespace.yaml \
            kubernetes/configmap.yaml \
            kubernetes/statefulset-postgres.yaml \
            kubernetes/statefulset-redis.yaml \
            kubernetes/deployment.yaml \
            kubernetes/service.yaml \
            kubernetes/ingress.yaml \
            kubernetes/hpa.yaml \
            kubernetes/networkpolicy.yaml; do
            echo "Applying ${manifest}..."
            kubectl apply -f "${manifest}" --namespace="${{ env.NAMESPACE }}"
          done

      - name: Update image
        run: |
          kubectl set image deployment/${{ env.DEPLOYMENT }} \
            ${{ env.DEPLOYMENT }}=${{ needs.build-push.outputs.image }} \
            --namespace="${{ env.NAMESPACE }}"

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/${{ env.DEPLOYMENT }} \
            --namespace="${{ env.NAMESPACE }}" \
            --timeout=300s

      - name: Verify deployment
        run: |
          READY=$(kubectl get deployment ${{ env.DEPLOYMENT }} \
            --namespace="${{ env.NAMESPACE }}" \
            -o jsonpath='{.status.readyReplicas}')
          DESIRED=$(kubectl get deployment ${{ env.DEPLOYMENT }} \
            --namespace="${{ env.NAMESPACE }}" \
            -o jsonpath='{.spec.replicas}')
          echo "Ready: ${READY}/${DESIRED}"
          [[ "${READY}" == "${DESIRED}" ]] || { echo "Deployment not healthy"; exit 1; }

      - name: Deployment summary
        if: always()
        run: |
          echo "## Deployment" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ needs.build-push.outputs.image }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Namespace | \`${{ env.NAMESPACE }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | https://openclaw.yourdomain.com |" >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # Job 5 — Slack notification
  # ---------------------------------------------------------------------------
  notify:
    name: Notify Slack
    needs: [build-push, deploy]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Determine status
        id: status
        run: |
          if [[ "${{ needs.deploy.result }}" == "success" ]]; then
            echo "color=good"            >> $GITHUB_OUTPUT
            echo "emoji=:rocket:"        >> $GITHUB_OUTPUT
            echo "text=Deploy succeeded" >> $GITHUB_OUTPUT
          else
            echo "color=danger"          >> $GITHUB_OUTPUT
            echo "emoji=:red_circle:"    >> $GITHUB_OUTPUT
            echo "text=Deploy FAILED"    >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "attachments": [
                {
                  "color": "${{ steps.status.outputs.color }}",
                  "title": "${{ steps.status.outputs.emoji }} openclaw-teams — ${{ steps.status.outputs.text }}",
                  "fields": [
                    { "title": "Branch",    "value": "${{ github.ref_name }}", "short": true },
                    { "title": "Commit",    "value": "${{ github.sha }}",      "short": true },
                    { "title": "Author",    "value": "${{ github.actor }}",    "short": true },
                    { "title": "Image",     "value": "`${{ needs.build-push.outputs.image }}`", "short": false },
                    { "title": "Workflow",  "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>", "short": false }
                  ],
                  "footer": "GitHub Actions",
                  "ts": "${{ github.event.head_commit.timestamp }}"
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
